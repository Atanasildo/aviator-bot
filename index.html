<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Aviator Bot</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --azul: #3b82f6;
      --rosa: #f472b6;
      --verde: #22c55e;
      --amarelo: #facc15;
      --vermelho: #ef4444;
      --branco: #e2e8f0;
      --cinza: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--branco); font-family: monospace; overflow: hidden; }

    /* ── BARRA TOPO ── */
    #bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 58px;
      z-index: 9999;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
      transition: background 0.3s, border-color 0.3s;
    }
    #bar.entrada  { background: #0b2218; border-color: var(--verde); }
    #bar.aviso    { background: #221a0b; border-color: var(--amarelo); }
    #bar.pausa    { background: #220b0b; border-color: var(--vermelho); }

    #ico { font-size: 22px; min-width: 26px; }
    #info { flex: 1; overflow: hidden; }
    #lbl { font-size: 9px; letter-spacing: 2px; color: var(--cinza); text-transform: uppercase; }
    #msg { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--branco); }
    #msg.entrada { color: var(--verde); }
    #msg.aviso   { color: var(--amarelo); }
    #msg.pausa   { color: var(--vermelho); }
    #msg.info    { color: var(--azul); }

    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--cinza); flex-shrink: 0; }
    .dot.on    { background: var(--verde);    animation: p 1.4s infinite; }
    .dot.aviso { background: var(--amarelo);  animation: p 0.9s infinite; }
    .dot.pausa { background: var(--vermelho); animation: p 0.5s infinite; }
    @keyframes p { 0%,100%{box-shadow:0 0 0 0 currentColor}50%{box-shadow:0 0 0 5px transparent} }

    #bcfg { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--cinza); font-size: 18px; width: 34px; height: 34px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }

    /* ── WEBVIEW via capacitor ── */
    #wv {
      position: fixed;
      top: 58px; left: 0; right: 0; bottom: 0;
      width: 100%; height: calc(100% - 58px);
      border: none;
      background: #fff;
    }

    /* ── PAINEL CONFIG ── */
    #cfg {
      display: none;
      position: fixed;
      top: 58px; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      z-index: 8888;
      padding: 20px 16px;
      overflow-y: auto;
    }
    #cfg.open { display: block; }
    #cfg h2 { font-size: 10px; letter-spacing: 3px; color: var(--cinza); text-transform: uppercase; margin-bottom: 18px; }
    .grp { margin-bottom: 16px; }
    .grp label { display:block; font-size:11px; color:var(--cinza); margin-bottom:6px; }
    .grp input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--branco); font-family:monospace; font-size:13px; outline:none; }
    .grp input:focus { border-color: var(--azul); }
    .btn { width:100%; padding:14px; border-radius:10px; border:none; font-family:monospace; font-size:13px; font-weight:700; cursor:pointer; margin-bottom:10px; }
    .btn.b { background: var(--azul); color:#fff; }
    .btn.g { background: #16a34a; color:#fff; }
    .btn.f { background: var(--surface); color:var(--cinza); border:1px solid var(--border); }

    #feed-tit { font-size:10px; letter-spacing:2px; color:var(--cinza); text-transform:uppercase; margin: 16px 0 10px; }
    #feed { display:flex; flex-direction:column; gap:8px; }
    .fi { background:var(--surface); border-left:3px solid var(--cinza); border-radius:8px; padding:10px 12px; font-size:12px; line-height:1.5; }
    .fi.entrada { border-color: var(--verde); }
    .fi.aviso   { border-color: var(--amarelo); }
    .fi.pausa   { border-color: var(--vermelho); }
    .fi.info    { border-color: var(--azul); }
    .fh { font-size:10px; color:var(--cinza); margin-top:3px; }

    /* Notif flutuante */
    #notif { position:fixed; bottom:20px; left:16px; right:16px; background:var(--surface); border:1px solid var(--verde); border-radius:12px; padding:14px 16px; font-family:monospace; font-size:13px; color:var(--verde); font-weight:700; z-index:99999; display:none; }
  </style>
</head>
<body>

<div id="bar">
  <span id="ico">📡</span>
  <div id="info">
    <div id="lbl">AVIATOR BOT</div>
    <div id="msg" class="info">A aguardar servidor...</div>
  </div>
  <div class="dot" id="dot"></div>
  <div id="bcfg" onclick="toggleCfg()">⚙️</div>
</div>

<!-- WebView nativa via Capacitor — carrega o ElephantBet -->
<iframe id="wv" src="about:blank"></iframe>

<div id="cfg">
  <h2>⚙️ Configurações</h2>
  <div class="grp">
    <label>URL DO SERVIDOR DE SINAIS</label>
    <input type="text" id="srv" placeholder="http://SEU-IP:3000"/>
  </div>
  <button class="btn b" onclick="ligar()">📡 Ligar ao Servidor</button>
  <button class="btn g" onclick="abrirSite()">🌍 Abrir ElephantBet</button>
  <button class="btn f" onclick="toggleCfg()">✕ Fechar</button>
  <div id="feed-tit">HISTÓRICO DE SINAIS</div>
  <div id="feed">
    <div class="fi info"><div>📡 Liga ao servidor para receber sinais.</div></div>
  </div>
</div>

<div id="notif"></div>

<script>
  // Usar Capacitor Browser para abrir o site nativamente
  // sem bloqueio de iframe
  let evtSource = null;
  const KEY = 'aviator_srv';

  window.onload = async () => {
    // Tentar abrir com Capacitor Browser plugin
    await abrirSite();
    const saved = localStorage.getItem(KEY);
    if (saved) { document.getElementById('srv').value = saved; ligar(); }
  };

  async function abrirSite() {
    try {
      // Tentar Capacitor InAppBrowser
      const { Browser } = Capacitor.Plugins;
      if (Browser) {
        await Browser.open({ url: 'https://elephantbet.co.ao', presentationStyle: 'fullscreen' });
        return;
      }
    } catch(e) {}
    // Fallback: abrir no browser nativo
    window.open('https://elephantbet.co.ao', '_system');
  }

  function toggleCfg() {
    document.getElementById('cfg').classList.toggle('open');
  }

  function ligar() {
    const url = document.getElementById('srv').value.trim();
    if (!url) { setBarra('AVISO','⚠️ Insere o URL.','aviso'); return; }
    localStorage.setItem(KEY, url);
    if (evtSource) evtSource.close();
    setBarra('INFO','🔄 A ligar...','info');
    evtSource = new EventSource(`${url}/sinais`);
    evtSource.onopen = () => { setBarra('CONECTADO','✅ Bot ativo!','info'); addFeed({mensagem:'✅ Servidor ligado!',nivel:'entrada'}); };
    evtSource.onmessage = (e) => {
      const s = JSON.parse(e.data);
      setBarra(s.tipo, s.mensagem, s.nivel);
      addFeed(s);
      if (s.tipo==='SINAL_ROSA'||s.tipo==='PADRAO_TEMPO') notif(s.mensagem);
    };
    evtSource.onerror = () => setBarra('ERRO','❌ Sem ligação','pausa');
  }

  const MAP = {
    'PAUSA':        {b:'pausa',  i:'🛑', d:'pausa', m:'pausa'},
    'AVISO':        {b:'aviso',  i:'⚠️', d:'aviso', m:'aviso'},
    'AGUARDAR':     {b:'aviso',  i:'⏳', d:'aviso', m:'aviso'},
    'SINAL_ROSA':   {b:'entrada',i:'🌸', d:'on',    m:'entrada'},
    'PADRAO_TEMPO': {b:'entrada',i:'🕐', d:'on',    m:'entrada'},
    'CONECTADO':    {b:'',       i:'📡', d:'on',    m:'info'},
    'INFO':         {b:'',       i:'📡', d:'',      m:'info'},
    'ERRO':         {b:'pausa',  i:'❌', d:'pausa', m:'pausa'},
  };

  function setBarra(tipo, texto, nivel) {
    const m = MAP[tipo] || {b:'',i:'📡',d:'',m:'info'};
    document.getElementById('bar').className = m.b;
    document.getElementById('ico').textContent = m.i;
    const el = document.getElementById('msg');
    el.className = m.m; el.textContent = texto;
    document.getElementById('dot').className = 'dot ' + m.d;
  }

  function addFeed(s) {
    const f = document.getElementById('feed');
    const h = new Date(s.timestamp||Date.now()).toLocaleTimeString('pt-PT');
    const d = document.createElement('div');
    d.className = `fi ${s.nivel||'info'}`;
    d.innerHTML = `<div>${s.mensagem}</div><div class="fh">${h}</div>`;
    f.insertBefore(d, f.firstChild);
    while(f.children.length>30) f.removeChild(f.lastChild);
  }

  function notif(t) {
    const n = document.getElementById('notif');
    n.textContent = t; n.style.display='block';
    setTimeout(()=>n.style.display='none', 4000);
  }
</script>
</body>
</html>
